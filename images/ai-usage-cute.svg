<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Maru Gothic ProN', 'Comic Sans MS', sans-serif">
  <style>
    .bg { fill: #fff5f9; }
    .title { fill: #d6336c; font-size: 18px; font-weight: 700; }
    .subtitle { fill: #b06b8a; font-size: 11px; }
    .stat-num { fill: #ec4899; font-size: 36px; font-weight: 800; }
    .stat-label { fill: #b06b8a; font-size: 11px; }
    .section { fill: #d6336c; font-size: 12px; font-weight: 700; }
    .row-label { fill: #6b3a52; font-size: 12px; }
    .row-value { fill: #b06b8a; font-size: 11px; }
    .bar { fill: url(#barGrad); rx: 7; }
    .spark { fill: none; stroke: #f472b6; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .spark-area { fill: url(#sparkGrad); opacity: 0.55; }
    .paw { fill: #f9c2da; opacity: 0.55; }
    .heart { fill: #ec4899; }
    @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
    @keyframes beat { 0%, 100% { transform: scale(1); } 30% { transform: scale(1.25); } }
    .anim { animation: fadein 0.6s ease-out both; }
    .bob { animation: bob 1.8s ease-in-out infinite; transform-origin: center; }
    .beat { animation: beat 1.2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
  </style>
  <defs>
    <linearGradient id="barGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <symbol id="paw" viewBox="0 0 32 32">
      <circle cx="16" cy="20" r="7"/>
      <ellipse cx="7" cy="13" rx="3" ry="4"/>
      <ellipse cx="13" cy="8" rx="3" ry="4"/>
      <ellipse cx="19" cy="8" rx="3" ry="4"/>
      <ellipse cx="25" cy="13" rx="3" ry="4"/>
    </symbol>
  </defs>

  <rect class="bg" width="800" height="480" rx="22"/>

  <use href="#paw" class="paw" x="720" y="14"  width="28" height="28" transform="rotate(20 734 28)"/>
  <use href="#paw" class="paw" x="755" y="44"  width="20" height="20" transform="rotate(-15 765 54)"/>
  <use href="#paw" class="paw" x="700" y="430" width="22" height="22" transform="rotate(-10 711 441)"/>
  <use href="#paw" class="paw" x="740" y="412" width="16" height="16" transform="rotate(25 748 420)"/>

  <g class="anim">
    <text x="20" y="36" class="title">🐾 Coding with Claude (and the cats)</text>
    <text x="20" y="58" class="subtitle">last 30 days · 🐱 Nyan1-Go &amp; Nyan2-Go supervising</text>
  </g>

  <g class="anim" style="animation-delay: 0.1s">
    <text x="20"  y="120" class="stat-num">74</text>
    <text x="20"  y="142" class="stat-label">sessions ✨</text>
    <text x="220" y="120" class="stat-num">3936</text>
    <text x="220" y="142" class="stat-label">tool calls 🛠️</text>
    <text x="460" y="120" class="stat-num">4</text>
    <text x="460" y="142" class="stat-label">skills used 💖</text>
  </g>

  <g class="anim" style="animation-delay: 0.2s">
    <text x="20" y="180" class="section">🌷 Top tools</text>
    <text x="20" y="195" class="row-label">Bash</text><rect x="200" y="183" height="14" width="400.0" class="bar"><animate attributeName="width" from="0" to="400.0" dur="1.2s" fill="freeze"/></rect><text x="610.0" y="195" class="row-value">1698</text>
<text x="20" y="221" class="row-label">Read</text><rect x="200" y="209" height="14" width="241.9" class="bar"><animate attributeName="width" from="0" to="241.9" dur="1.2s" fill="freeze"/></rect><text x="451.9" y="221" class="row-value">1027</text>
<text x="20" y="247" class="row-label">Edit</text><rect x="200" y="235" height="14" width="146.3" class="bar"><animate attributeName="width" from="0" to="146.3" dur="1.2s" fill="freeze"/></rect><text x="356.3" y="247" class="row-value">621</text>
<text x="20" y="273" class="row-label">Write</text><rect x="200" y="261" height="14" width="40.5" class="bar"><animate attributeName="width" from="0" to="40.5" dur="1.2s" fill="freeze"/></rect><text x="250.5" y="273" class="row-value">172</text>
<text x="20" y="299" class="row-label">TaskUpdate</text><rect x="200" y="287" height="14" width="24.0" class="bar"><animate attributeName="width" from="0" to="24.0" dur="1.2s" fill="freeze"/></rect><text x="234.0" y="299" class="row-value">102</text>
  </g>

  <g class="anim" style="animation-delay: 0.3s">
    <text x="20" y="345" class="section">🍡 Top skills</text>
    <text x="20" y="360" class="row-label">humanize</text><rect x="200" y="348" height="14" width="400.0" class="bar"><animate attributeName="width" from="0" to="400.0" dur="1.2s" fill="freeze"/></rect><text x="610.0" y="360" class="row-value">4</text>
<text x="20" y="386" class="row-label">schedule</text><rect x="200" y="374" height="14" width="200.0" class="bar"><animate attributeName="width" from="0" to="200.0" dur="1.2s" fill="freeze"/></rect><text x="410.0" y="386" class="row-value">2</text>
<text x="20" y="412" class="row-label">review-code</text><rect x="200" y="400" height="14" width="100.0" class="bar"><animate attributeName="width" from="0" to="100.0" dur="1.2s" fill="freeze"/></rect><text x="310.0" y="412" class="row-value">1</text>
  </g>

  <g class="anim" style="animation-delay: 0.4s">
    <text x="20" y="430" class="section">🌸 Daily activity</text>
    <path class="spark-area" d="M20.0,458.5 L45.3,465.0 L70.7,458.6 L96.0,462.2 L121.3,453.6 L146.7,453.1 L172.0,461.5 L197.3,450.9 L222.7,457.9 L248.0,451.9 L273.3,459.7 L298.7,456.9 L324.0,453.7 L349.3,444.4 L374.7,440.0 L400.0,454.8 L425.3,463.3 L450.7,457.9 L476.0,451.6 L501.3,449.6 L526.7,458.8 L552.0,463.9 L577.3,457.6 L602.7,461.0 L628.0,463.1 L653.3,451.2 L678.7,458.8 L704.0,449.5 L729.3,456.6 L754.7,462.1 L780.0,453.3 L780,465 L20,465 Z"/>
    <path class="spark" d="M20.0,458.5 L45.3,465.0 L70.7,458.6 L96.0,462.2 L121.3,453.6 L146.7,453.1 L172.0,461.5 L197.3,450.9 L222.7,457.9 L248.0,451.9 L273.3,459.7 L298.7,456.9 L324.0,453.7 L349.3,444.4 L374.7,440.0 L400.0,454.8 L425.3,463.3 L450.7,457.9 L476.0,451.6 L501.3,449.6 L526.7,458.8 L552.0,463.9 L577.3,457.6 L602.7,461.0 L628.0,463.1 L653.3,451.2 L678.7,458.8 L704.0,449.5 L729.3,456.6 L754.7,462.1 L780.0,453.3">
      <animate attributeName="stroke-dasharray" from="0,2000" to="2000,0" dur="1.6s" fill="freeze"/>
    </path>
    <g class="bob">
      <text x="780" y="455" font-size="18" text-anchor="middle">🐱</text>
    </g>
    <text x="40" y="470" font-size="14" class="heart beat">💖</text>
  </g>
</svg>
