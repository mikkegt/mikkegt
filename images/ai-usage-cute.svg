<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Maru Gothic ProN', 'Comic Sans MS', sans-serif">
  <style>
    .bg { fill: #fff5f9; }
    .title { fill: #d6336c; font-size: 18px; font-weight: 700; }
    .subtitle { fill: #b06b8a; font-size: 11px; }
    .stat-num { fill: #ec4899; font-size: 36px; font-weight: 800; }
    .stat-label { fill: #b06b8a; font-size: 11px; }
    .section { fill: #d6336c; font-size: 12px; font-weight: 700; }
    .row-label { fill: #6b3a52; font-size: 12px; }
    .row-value { fill: #b06b8a; font-size: 11px; }
    .bar { fill: url(#barGrad); rx: 7; }
    .spark { fill: none; stroke: #f472b6; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .spark-area { fill: url(#sparkGrad); opacity: 0.55; }
    .paw { fill: #f9c2da; opacity: 0.55; }
    .heart { fill: #ec4899; }
    @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
    @keyframes beat { 0%, 100% { transform: scale(1); } 30% { transform: scale(1.25); } }
    .anim { animation: fadein 0.6s ease-out both; }
    .bob { animation: bob 1.8s ease-in-out infinite; transform-origin: center; }
    .beat { animation: beat 1.2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
  </style>
  <defs>
    <linearGradient id="barGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>
    <symbol id="paw" viewBox="0 0 32 32">
      <circle cx="16" cy="20" r="7"/>
      <ellipse cx="7" cy="13" rx="3" ry="4"/>
      <ellipse cx="13" cy="8" rx="3" ry="4"/>
      <ellipse cx="19" cy="8" rx="3" ry="4"/>
      <ellipse cx="25" cy="13" rx="3" ry="4"/>
    </symbol>
  </defs>

  <rect class="bg" width="800" height="480" rx="22"/>

  <use href="#paw" class="paw" x="720" y="14"  width="28" height="28" transform="rotate(20 734 28)"/>
  <use href="#paw" class="paw" x="755" y="44"  width="20" height="20" transform="rotate(-15 765 54)"/>
  <use href="#paw" class="paw" x="700" y="430" width="22" height="22" transform="rotate(-10 711 441)"/>
  <use href="#paw" class="paw" x="740" y="412" width="16" height="16" transform="rotate(25 748 420)"/>

  <g class="anim">
    <text x="20" y="36" class="title">🐾 Coding with Claude (and the cats)</text>
    <text x="20" y="58" class="subtitle">last 30 days · 🐱 Nyan1-Go &amp; Nyan2-Go supervising</text>
  </g>

  <g class="anim" style="animation-delay: 0.1s">
    <text x="20"  y="120" class="stat-num">75</text>
    <text x="20"  y="142" class="stat-label">sessions ✨</text>
    <text x="220" y="120" class="stat-num">3627</text>
    <text x="220" y="142" class="stat-label">tool calls 🛠️</text>
    <text x="460" y="120" class="stat-num">5</text>
    <text x="460" y="142" class="stat-label">skills used 💖</text>
  </g>

  <g class="anim" style="animation-delay: 0.2s">
    <text x="20" y="180" class="section">🌷 Top tools</text>
    <text x="20" y="195" class="row-label">Bash</text><rect x="200" y="183" height="14" width="400.0" class="bar"><animate attributeName="width" from="0" to="400.0" dur="1.2s" fill="freeze"/></rect><text x="610.0" y="195" class="row-value">1574</text>
<text x="20" y="221" class="row-label">Read</text><rect x="200" y="209" height="14" width="238.6" class="bar"><animate attributeName="width" from="0" to="238.6" dur="1.2s" fill="freeze"/></rect><text x="448.6" y="221" class="row-value">939</text>
<text x="20" y="247" class="row-label">Edit</text><rect x="200" y="235" height="14" width="140.5" class="bar"><animate attributeName="width" from="0" to="140.5" dur="1.2s" fill="freeze"/></rect><text x="350.5" y="247" class="row-value">553</text>
<text x="20" y="273" class="row-label">Write</text><rect x="200" y="261" height="14" width="43.5" class="bar"><animate attributeName="width" from="0" to="43.5" dur="1.2s" fill="freeze"/></rect><text x="253.5" y="273" class="row-value">171</text>
<text x="20" y="299" class="row-label">Grep</text><rect x="200" y="287" height="14" width="21.1" class="bar"><animate attributeName="width" from="0" to="21.1" dur="1.2s" fill="freeze"/></rect><text x="231.1" y="299" class="row-value">83</text>
  </g>

  <g class="anim" style="animation-delay: 0.3s">
    <text x="20" y="345" class="section">🍡 Top skills</text>
    <text x="20" y="360" class="row-label">humanize</text><rect x="200" y="348" height="14" width="400.0" class="bar"><animate attributeName="width" from="0" to="400.0" dur="1.2s" fill="freeze"/></rect><text x="610.0" y="360" class="row-value">3</text>
<text x="20" y="386" class="row-label">schedule</text><rect x="200" y="374" height="14" width="266.7" class="bar"><animate attributeName="width" from="0" to="266.7" dur="1.2s" fill="freeze"/></rect><text x="476.7" y="386" class="row-value">2</text>
<text x="20" y="412" class="row-label">review-code</text><rect x="200" y="400" height="14" width="133.3" class="bar"><animate attributeName="width" from="0" to="133.3" dur="1.2s" fill="freeze"/></rect><text x="343.3" y="412" class="row-value">1</text>
  </g>

  <g class="anim" style="animation-delay: 0.4s">
    <text x="20" y="430" class="section">🌸 Daily activity</text>
    <path class="spark-area" d="M20.0,464.6 L45.3,445.7 L70.7,457.7 L96.0,464.5 L121.3,454.4 L146.7,440.0 L172.0,453.1 L197.3,453.3 L222.7,447.2 L248.0,447.7 L273.3,465.0 L298.7,458.6 L324.0,462.3 L349.3,453.7 L374.7,453.2 L400.0,461.5 L425.3,451.1 L450.7,458.0 L476.0,452.1 L501.3,459.7 L526.7,457.0 L552.0,453.8 L577.3,444.6 L602.7,440.3 L628.0,454.9 L653.3,463.3 L678.7,458.0 L704.0,451.7 L729.3,449.7 L754.7,458.9 L780.0,463.9 L780,465 L20,465 Z"/>
    <path class="spark" d="M20.0,464.6 L45.3,445.7 L70.7,457.7 L96.0,464.5 L121.3,454.4 L146.7,440.0 L172.0,453.1 L197.3,453.3 L222.7,447.2 L248.0,447.7 L273.3,465.0 L298.7,458.6 L324.0,462.3 L349.3,453.7 L374.7,453.2 L400.0,461.5 L425.3,451.1 L450.7,458.0 L476.0,452.1 L501.3,459.7 L526.7,457.0 L552.0,453.8 L577.3,444.6 L602.7,440.3 L628.0,454.9 L653.3,463.3 L678.7,458.0 L704.0,451.7 L729.3,449.7 L754.7,458.9 L780.0,463.9">
      <animate attributeName="stroke-dasharray" from="0,2000" to="2000,0" dur="1.6s" fill="freeze"/>
    </path>
    <g class="bob">
      <text x="780" y="455" font-size="18" text-anchor="middle">🐱</text>
    </g>
    <text x="40" y="470" font-size="14" class="heart beat">💖</text>
  </g>
</svg>
