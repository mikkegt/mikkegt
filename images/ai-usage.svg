    .row-label { fill: #e7ecff; font-size: 12px; }
    .row-value { fill: #6c7293; font-size: 11px; }
    .bar { fill: url(#barGrad); rx: 0; }
    .rhythm-bar { fill: #41ead4; }
    .rhythm-label { fill: #6c7293; font-size: 9px; }
    .px { fill: #ff5d8f; }
  </style>
