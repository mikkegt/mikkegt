<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
  <style>
    .bg { fill: #0d1117; }
    .title { fill: #c9d1d9; font-size: 18px; font-weight: 600; }
    .subtitle { fill: #8b949e; font-size: 11px; }
    .stat-num { fill: #58a6ff; font-size: 36px; font-weight: 700; }
    .stat-label { fill: #8b949e; font-size: 11px; }
    .section { fill: #c9d1d9; font-size: 12px; font-weight: 600; }
    .row-label { fill: #c9d1d9; font-size: 12px; }
    .row-value { fill: #8b949e; font-size: 11px; }
    .bar { fill: url(#barGrad); rx: 3; }
    .spark { fill: none; stroke: #3fb950; stroke-width: 2; }
    .spark-area { fill: url(#sparkGrad); opacity: 0.5; }
    @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .anim { animation: fadein 0.6s ease-out both; }
  </style>
  <defs>
    <linearGradient id="barGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect class="bg" width="800" height="360" rx="12"/>

  <g class="anim">
    <text x="20" y="32" class="title">🤖 AI Pair Programming with Claude Code</text>
    <text x="20" y="50" class="subtitle">last 30 days · powered by ~/.claude/projects</text>
  </g>

  <g class="anim" style="animation-delay: 0.1s">
    <text x="20"  y="100" class="stat-num">82</text>
    <text x="20"  y="118" class="stat-label">sessions</text>
    <text x="220" y="100" class="stat-num">3755</text>
    <text x="220" y="118" class="stat-label">tool calls</text>
    <text x="460" y="100" class="stat-num">7</text>
    <text x="460" y="118" class="stat-label">skills used</text>
  </g>

  <g class="anim" style="animation-delay: 0.2s">
    <text x="20" y="150" class="section">Top tools</text>
    <text x="20" y="160" class="row-label">Bash</text><rect x="200" y="148" height="14" width="400.0" class="bar"><animate attributeName="width" from="0" to="400.0" dur="1.2s" fill="freeze"/></rect><text x="610.0" y="160" class="row-value">1605</text>
<text x="20" y="182" class="row-label">Read</text><rect x="200" y="170" height="14" width="237.8" class="bar"><animate attributeName="width" from="0" to="237.8" dur="1.2s" fill="freeze"/></rect><text x="447.8" y="182" class="row-value">954</text>
<text x="20" y="204" class="row-label">Edit</text><rect x="200" y="192" height="14" width="138.6" class="bar"><animate attributeName="width" from="0" to="138.6" dur="1.2s" fill="freeze"/></rect><text x="348.6" y="204" class="row-value">556</text>
<text x="20" y="226" class="row-label">Write</text><rect x="200" y="214" height="14" width="45.6" class="bar"><animate attributeName="width" from="0" to="45.6" dur="1.2s" fill="freeze"/></rect><text x="255.6" y="226" class="row-value">183</text>
<text x="20" y="248" class="row-label">Grep</text><rect x="200" y="236" height="14" width="36.4" class="bar"><animate attributeName="width" from="0" to="36.4" dur="1.2s" fill="freeze"/></rect><text x="246.4" y="248" class="row-value">146</text>
  </g>

  <g class="anim" style="animation-delay: 0.3s">
    <text x="20" y="240" class="section">Top skills</text>
    <text x="20" y="250" class="row-label">humanize</text><rect x="200" y="238" height="14" width="400.0" class="bar"><animate attributeName="width" from="0" to="400.0" dur="1.2s" fill="freeze"/></rect><text x="610.0" y="250" class="row-value">3</text>
<text x="20" y="272" class="row-label">schedule</text><rect x="200" y="260" height="14" width="266.7" class="bar"><animate attributeName="width" from="0" to="266.7" dur="1.2s" fill="freeze"/></rect><text x="476.7" y="272" class="row-value">2</text>
<text x="20" y="294" class="row-label">review</text><rect x="200" y="282" height="14" width="133.3" class="bar"><animate attributeName="width" from="0" to="133.3" dur="1.2s" fill="freeze"/></rect><text x="343.3" y="294" class="row-value">1</text>
  </g>

  <g class="anim" style="animation-delay: 0.4s">
    <text x="20" y="295" class="section">Daily activity</text>
    <path class="spark-area" d="M20.0,339.0 L45.3,300.0 L70.7,316.0 L96.0,338.7 L121.3,331.0 L146.7,340.0 L172.0,304.8 L197.3,337.8 L222.7,337.4 L248.0,316.2 L273.3,331.0 L298.7,339.3 L324.0,326.9 L349.3,309.2 L374.7,325.3 L400.0,325.5 L425.3,318.0 L450.7,318.7 L476.0,340.0 L501.3,332.2 L526.7,336.6 L552.0,326.1 L577.3,325.4 L602.7,335.7 L628.0,322.9 L653.3,331.4 L678.7,324.1 L704.0,333.5 L729.3,330.1 L754.7,326.2 L780.0,319.0 L780,340 L20,340 Z"/>
    <path class="spark" d="M20.0,339.0 L45.3,300.0 L70.7,316.0 L96.0,338.7 L121.3,331.0 L146.7,340.0 L172.0,304.8 L197.3,337.8 L222.7,337.4 L248.0,316.2 L273.3,331.0 L298.7,339.3 L324.0,326.9 L349.3,309.2 L374.7,325.3 L400.0,325.5 L425.3,318.0 L450.7,318.7 L476.0,340.0 L501.3,332.2 L526.7,336.6 L552.0,326.1 L577.3,325.4 L602.7,335.7 L628.0,322.9 L653.3,331.4 L678.7,324.1 L704.0,333.5 L729.3,330.1 L754.7,326.2 L780.0,319.0">
      <animate attributeName="stroke-dasharray" from="0,2000" to="2000,0" dur="1.4s" fill="freeze"/>
    </path>
  </g>
</svg>
