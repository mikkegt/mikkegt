<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
  <style>
    .bg { fill: #0d1117; }
    .title { fill: #c9d1d9; font-size: 18px; font-weight: 600; }
    .subtitle { fill: #8b949e; font-size: 11px; }
    .stat-num { fill: #58a6ff; font-size: 36px; font-weight: 700; }
    .stat-label { fill: #8b949e; font-size: 11px; }
    .section { fill: #c9d1d9; font-size: 12px; font-weight: 600; }
    .row-label { fill: #c9d1d9; font-size: 12px; }
    .row-value { fill: #8b949e; font-size: 11px; }
    .bar { fill: url(#barGrad); rx: 3; }
    .spark { fill: none; stroke: #3fb950; stroke-width: 2; }
    .spark-area { fill: url(#sparkGrad); opacity: 0.5; }
    @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .anim { animation: fadein 0.6s ease-out both; }
  </style>
  <defs>
    <linearGradient id="barGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect class="bg" width="800" height="480" rx="12"/>

  <g class="anim">
    <text x="20" y="36" class="title">🤖 AI Pair Programming with Claude Code</text>
    <text x="20" y="58" class="subtitle">last 30 days · powered by ~/.claude/projects</text>
  </g>

  <g class="anim" style="animation-delay: 0.1s">
    <text x="20"  y="120" class="stat-num">75</text>
    <text x="20"  y="142" class="stat-label">sessions</text>
    <text x="220" y="120" class="stat-num">4393</text>
    <text x="220" y="142" class="stat-label">tool calls</text>
    <text x="460" y="120" class="stat-num">4</text>
    <text x="460" y="142" class="stat-label">skills used</text>
  </g>

  <g class="anim" style="animation-delay: 0.2s">
    <text x="20" y="180" class="section">Top tools</text>
    <text x="20" y="195" class="row-label">Bash</text><rect x="200" y="183" height="14" width="400.0" class="bar"><animate attributeName="width" from="0" to="400.0" dur="1.2s" fill="freeze"/></rect><text x="610.0" y="195" class="row-value">1862</text>
<text x="20" y="221" class="row-label">Read</text><rect x="200" y="209" height="14" width="237.8" class="bar"><animate attributeName="width" from="0" to="237.8" dur="1.2s" fill="freeze"/></rect><text x="447.8" y="221" class="row-value">1107</text>
<text x="20" y="247" class="row-label">Edit</text><rect x="200" y="235" height="14" width="163.5" class="bar"><animate attributeName="width" from="0" to="163.5" dur="1.2s" fill="freeze"/></rect><text x="373.5" y="247" class="row-value">761</text>
<text x="20" y="273" class="row-label">Write</text><rect x="200" y="261" height="14" width="39.7" class="bar"><animate attributeName="width" from="0" to="39.7" dur="1.2s" fill="freeze"/></rect><text x="249.7" y="273" class="row-value">185</text>
<text x="20" y="299" class="row-label">TaskUpdate</text><rect x="200" y="287" height="14" width="29.9" class="bar"><animate attributeName="width" from="0" to="29.9" dur="1.2s" fill="freeze"/></rect><text x="239.9" y="299" class="row-value">139</text>
  </g>

  <g class="anim" style="animation-delay: 0.3s">
    <text x="20" y="345" class="section">Top skills</text>
    <text x="20" y="360" class="row-label">humanize</text><rect x="200" y="348" height="14" width="400.0" class="bar"><animate attributeName="width" from="0" to="400.0" dur="1.2s" fill="freeze"/></rect><text x="610.0" y="360" class="row-value">5</text>
<text x="20" y="386" class="row-label">review-code</text><rect x="200" y="374" height="14" width="160.0" class="bar"><animate attributeName="width" from="0" to="160.0" dur="1.2s" fill="freeze"/></rect><text x="370.0" y="386" class="row-value">2</text>
<text x="20" y="412" class="row-label">schedule</text><rect x="200" y="400" height="14" width="160.0" class="bar"><animate attributeName="width" from="0" to="160.0" dur="1.2s" fill="freeze"/></rect><text x="370.0" y="412" class="row-value">2</text>
  </g>

  <g class="anim" style="animation-delay: 0.4s">
    <text x="20" y="430" class="section">Daily activity</text>
    <path class="spark-area" d="M20.0,465.0 L45.3,453.6 L70.7,453.1 L96.0,461.5 L121.3,450.9 L146.7,457.9 L172.0,451.9 L197.3,459.7 L222.7,456.9 L248.0,453.7 L273.3,444.4 L298.7,440.0 L324.0,454.8 L349.3,463.3 L374.7,457.9 L400.0,451.6 L425.3,449.6 L450.7,458.8 L476.0,463.9 L501.3,457.6 L526.7,461.0 L552.0,463.1 L577.3,451.2 L602.7,458.8 L628.0,449.5 L653.3,456.6 L678.7,462.1 L704.0,453.3 L729.3,462.4 L754.7,441.8 L780.0,446.2 L780,465 L20,465 Z"/>
    <path class="spark" d="M20.0,465.0 L45.3,453.6 L70.7,453.1 L96.0,461.5 L121.3,450.9 L146.7,457.9 L172.0,451.9 L197.3,459.7 L222.7,456.9 L248.0,453.7 L273.3,444.4 L298.7,440.0 L324.0,454.8 L349.3,463.3 L374.7,457.9 L400.0,451.6 L425.3,449.6 L450.7,458.8 L476.0,463.9 L501.3,457.6 L526.7,461.0 L552.0,463.1 L577.3,451.2 L602.7,458.8 L628.0,449.5 L653.3,456.6 L678.7,462.1 L704.0,453.3 L729.3,462.4 L754.7,441.8 L780.0,446.2">
      <animate attributeName="stroke-dasharray" from="0,2000" to="2000,0" dur="1.4s" fill="freeze"/>
    </path>
  </g>
</svg>
