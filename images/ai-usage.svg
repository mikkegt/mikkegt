<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
  <style>
    .bg { fill: #0d1117; }
    .title { fill: #c9d1d9; font-size: 18px; font-weight: 600; }
    .subtitle { fill: #8b949e; font-size: 11px; }
    .stat-num { fill: #58a6ff; font-size: 36px; font-weight: 700; }
    .stat-label { fill: #8b949e; font-size: 11px; }
    .section { fill: #c9d1d9; font-size: 12px; font-weight: 600; }
    .row-label { fill: #c9d1d9; font-size: 12px; }
    .row-value { fill: #8b949e; font-size: 11px; }
    .bar { fill: url(#barGrad); rx: 3; }
    .spark { fill: none; stroke: #3fb950; stroke-width: 2; }
    .spark-area { fill: url(#sparkGrad); opacity: 0.5; }
    @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .anim { animation: fadein 0.6s ease-out both; }
  </style>
  <defs>
    <linearGradient id="barGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect class="bg" width="800" height="480" rx="12"/>

  <g class="anim">
    <text x="20" y="36" class="title">🤖 AI Pair Programming with Claude Code</text>
    <text x="20" y="58" class="subtitle">last 30 days · powered by ~/.claude/projects</text>
  </g>

  <g class="anim" style="animation-delay: 0.1s">
    <text x="20"  y="120" class="stat-num">70</text>
    <text x="20"  y="142" class="stat-label">sessions</text>
    <text x="220" y="120" class="stat-num">3820</text>
    <text x="220" y="142" class="stat-label">tool calls</text>
    <text x="460" y="120" class="stat-num">7</text>
    <text x="460" y="142" class="stat-label">skills used</text>
  </g>

  <g class="anim" style="animation-delay: 0.2s">
    <text x="20" y="180" class="section">Top tools</text>
    <text x="20" y="195" class="row-label">Bash</text><rect x="200" y="183" height="14" width="400.0" class="bar"><animate attributeName="width" from="0" to="400.0" dur="1.2s" fill="freeze"/></rect><text x="610.0" y="195" class="row-value">1610</text>
<text x="20" y="221" class="row-label">Read</text><rect x="200" y="209" height="14" width="250.4" class="bar"><animate attributeName="width" from="0" to="250.4" dur="1.2s" fill="freeze"/></rect><text x="460.4" y="221" class="row-value">1008</text>
<text x="20" y="247" class="row-label">Edit</text><rect x="200" y="235" height="14" width="146.3" class="bar"><animate attributeName="width" from="0" to="146.3" dur="1.2s" fill="freeze"/></rect><text x="356.3" y="247" class="row-value">589</text>
<text x="20" y="273" class="row-label">Write</text><rect x="200" y="261" height="14" width="44.0" class="bar"><animate attributeName="width" from="0" to="44.0" dur="1.2s" fill="freeze"/></rect><text x="254.0" y="273" class="row-value">177</text>
<text x="20" y="299" class="row-label">Grep</text><rect x="200" y="287" height="14" width="31.3" class="bar"><animate attributeName="width" from="0" to="31.3" dur="1.2s" fill="freeze"/></rect><text x="241.3" y="299" class="row-value">126</text>
  </g>

  <g class="anim" style="animation-delay: 0.3s">
    <text x="20" y="345" class="section">Top skills</text>
    <text x="20" y="360" class="row-label">humanize</text><rect x="200" y="348" height="14" width="400.0" class="bar"><animate attributeName="width" from="0" to="400.0" dur="1.2s" fill="freeze"/></rect><text x="610.0" y="360" class="row-value">3</text>
<text x="20" y="386" class="row-label">schedule</text><rect x="200" y="374" height="14" width="266.7" class="bar"><animate attributeName="width" from="0" to="266.7" dur="1.2s" fill="freeze"/></rect><text x="476.7" y="386" class="row-value">2</text>
<text x="20" y="412" class="row-label">review</text><rect x="200" y="400" height="14" width="133.3" class="bar"><animate attributeName="width" from="0" to="133.3" dur="1.2s" fill="freeze"/></rect><text x="343.3" y="412" class="row-value">1</text>
  </g>

  <g class="anim" style="animation-delay: 0.4s">
    <text x="20" y="430" class="section">Daily activity</text>
    <path class="spark-area" d="M20.0,461.5 L45.3,448.0 L70.7,464.0 L96.0,458.6 L121.3,465.0 L146.7,440.0 L172.0,463.4 L197.3,463.2 L222.7,448.1 L248.0,458.6 L273.3,464.5 L298.7,455.7 L324.0,443.1 L349.3,454.6 L374.7,454.7 L400.0,449.4 L425.3,449.9 L450.7,465.0 L476.0,459.4 L501.3,462.6 L526.7,455.1 L552.0,454.6 L577.3,462.0 L602.7,452.8 L628.0,458.9 L653.3,453.7 L678.7,460.4 L704.0,458.0 L729.3,455.2 L754.7,447.2 L780.0,443.7 L780,465 L20,465 Z"/>
    <path class="spark" d="M20.0,461.5 L45.3,448.0 L70.7,464.0 L96.0,458.6 L121.3,465.0 L146.7,440.0 L172.0,463.4 L197.3,463.2 L222.7,448.1 L248.0,458.6 L273.3,464.5 L298.7,455.7 L324.0,443.1 L349.3,454.6 L374.7,454.7 L400.0,449.4 L425.3,449.9 L450.7,465.0 L476.0,459.4 L501.3,462.6 L526.7,455.1 L552.0,454.6 L577.3,462.0 L602.7,452.8 L628.0,458.9 L653.3,453.7 L678.7,460.4 L704.0,458.0 L729.3,455.2 L754.7,447.2 L780.0,443.7">
      <animate attributeName="stroke-dasharray" from="0,2000" to="2000,0" dur="1.4s" fill="freeze"/>
    </path>
  </g>
</svg>
