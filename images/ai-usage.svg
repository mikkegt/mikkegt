<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
  <style>
    .bg { fill: #0d1117; }
    .title { fill: #c9d1d9; font-size: 18px; font-weight: 600; }
    .subtitle { fill: #8b949e; font-size: 11px; }
    .stat-num { fill: #58a6ff; font-size: 36px; font-weight: 700; }
    .stat-label { fill: #8b949e; font-size: 11px; }
    .section { fill: #c9d1d9; font-size: 12px; font-weight: 600; }
    .row-label { fill: #c9d1d9; font-size: 12px; }
    .row-value { fill: #8b949e; font-size: 11px; }
    .bar { fill: url(#barGrad); rx: 3; }
    .spark { fill: none; stroke: #3fb950; stroke-width: 2; }
    .spark-area { fill: url(#sparkGrad); opacity: 0.5; }
    @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .anim { animation: fadein 0.6s ease-out both; }
  </style>
  <defs>
    <linearGradient id="barGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="sparkGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect class="bg" width="800" height="480" rx="12"/>

  <g class="anim">
    <text x="20" y="36" class="title">🤖 AI Pair Programming with Claude Code</text>
    <text x="20" y="58" class="subtitle">last 30 days · powered by ~/.claude/projects</text>
  </g>

  <g class="anim" style="animation-delay: 0.1s">
    <text x="20"  y="120" class="stat-num">79</text>
    <text x="20"  y="142" class="stat-label">sessions</text>
    <text x="220" y="120" class="stat-num">3671</text>
    <text x="220" y="142" class="stat-label">tool calls</text>
    <text x="460" y="120" class="stat-num">4</text>
    <text x="460" y="142" class="stat-label">skills used</text>
  </g>

  <g class="anim" style="animation-delay: 0.2s">
    <text x="20" y="180" class="section">Top tools</text>
    <text x="20" y="195" class="row-label">Bash</text><rect x="200" y="183" height="14" width="400.0" class="bar"><animate attributeName="width" from="0" to="400.0" dur="1.2s" fill="freeze"/></rect><text x="610.0" y="195" class="row-value">1620</text>
<text x="20" y="221" class="row-label">Read</text><rect x="200" y="209" height="14" width="223.7" class="bar"><animate attributeName="width" from="0" to="223.7" dur="1.2s" fill="freeze"/></rect><text x="433.7" y="221" class="row-value">906</text>
<text x="20" y="247" class="row-label">Edit</text><rect x="200" y="235" height="14" width="148.6" class="bar"><animate attributeName="width" from="0" to="148.6" dur="1.2s" fill="freeze"/></rect><text x="358.6" y="247" class="row-value">602</text>
<text x="20" y="273" class="row-label">Write</text><rect x="200" y="261" height="14" width="42.5" class="bar"><animate attributeName="width" from="0" to="42.5" dur="1.2s" fill="freeze"/></rect><text x="252.5" y="273" class="row-value">172</text>
<text x="20" y="299" class="row-label">Grep</text><rect x="200" y="287" height="14" width="19.0" class="bar"><animate attributeName="width" from="0" to="19.0" dur="1.2s" fill="freeze"/></rect><text x="229.0" y="299" class="row-value">77</text>
  </g>

  <g class="anim" style="animation-delay: 0.3s">
    <text x="20" y="345" class="section">Top skills</text>
    <text x="20" y="360" class="row-label">humanize</text><rect x="200" y="348" height="14" width="400.0" class="bar"><animate attributeName="width" from="0" to="400.0" dur="1.2s" fill="freeze"/></rect><text x="610.0" y="360" class="row-value">4</text>
<text x="20" y="386" class="row-label">schedule</text><rect x="200" y="374" height="14" width="200.0" class="bar"><animate attributeName="width" from="0" to="200.0" dur="1.2s" fill="freeze"/></rect><text x="410.0" y="386" class="row-value">2</text>
<text x="20" y="412" class="row-label">review-code</text><rect x="200" y="400" height="14" width="100.0" class="bar"><animate attributeName="width" from="0" to="100.0" dur="1.2s" fill="freeze"/></rect><text x="310.0" y="412" class="row-value">1</text>
  </g>

  <g class="anim" style="animation-delay: 0.4s">
    <text x="20" y="430" class="section">Daily activity</text>
    <path class="spark-area" d="M20.0,465.0 L45.3,453.0 L70.7,453.1 L96.0,447.0 L121.3,447.5 L146.7,465.0 L172.0,458.6 L197.3,462.2 L222.7,453.6 L248.0,453.1 L273.3,461.5 L298.7,450.9 L324.0,457.9 L349.3,451.9 L374.7,459.7 L400.0,456.9 L425.3,453.7 L450.7,444.4 L476.0,440.0 L501.3,454.8 L526.7,463.3 L552.0,457.9 L577.3,451.6 L602.7,449.6 L628.0,458.8 L653.3,463.9 L678.7,457.6 L704.0,461.0 L729.3,463.1 L754.7,451.2 L780.0,460.3 L780,465 L20,465 Z"/>
    <path class="spark" d="M20.0,465.0 L45.3,453.0 L70.7,453.1 L96.0,447.0 L121.3,447.5 L146.7,465.0 L172.0,458.6 L197.3,462.2 L222.7,453.6 L248.0,453.1 L273.3,461.5 L298.7,450.9 L324.0,457.9 L349.3,451.9 L374.7,459.7 L400.0,456.9 L425.3,453.7 L450.7,444.4 L476.0,440.0 L501.3,454.8 L526.7,463.3 L552.0,457.9 L577.3,451.6 L602.7,449.6 L628.0,458.8 L653.3,463.9 L678.7,457.6 L704.0,461.0 L729.3,463.1 L754.7,451.2 L780.0,460.3">
      <animate attributeName="stroke-dasharray" from="0,2000" to="2000,0" dur="1.4s" fill="freeze"/>
    </path>
  </g>
</svg>
